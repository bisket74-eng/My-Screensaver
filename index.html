
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Montserrat:wght@500&family=Raleway:wght@600&display=swap" rel="stylesheet">
    <style>
        body { background: black; margin: 0; overflow: hidden; color: white; }
        .container { display: flex; flex-direction: column; justify-content: space-around; height: 100vh; }
        
        /* Made banners thicker (120px -> 180px) and wider */
        .banner { 
            width: 800px; 
            height: 250px; 
            display: flex; 
            align-items: center; 
            padding: 0 60px; 
            position: relative;
            will-change:transform,left,right;
        }

        .fuzzy {
            mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
        }

        .time-banner {
            background: radial-gradient(circle, rgba(0,119,190,0.8) 0%, rgba(0,119,190,0) 85%);
            font-family: 'Montserrat', sans-serif; font-weight:900; color: #00e5ff;
            animation: flyLeft 25s ease-in-out infinite alternate;
        }

        .weather-banner {
            background: radial-gradient(circle, rgba(255,140,0,0.8) 0%, rgba(255,140,0,0) 85%);
            font-family: 'Montserrat', sans-serif; color: #ffb74d; align-self: flex-end;
            animation: flyRight 23s ease-in-out infinite alternate;
        }

        .upcoming-banner {
            background: radial-gradient(circle, rgba(155, 89, 182, 0.8) 0%, rgba(155, 89, 182, 0) 85%);
            font-family: 'Montserrat', sans-serif; color: #e1bee7;
            animation: flyLeft 24s ease-in-out infinite alternate, pulse 3s infinite alternate;
            #event {
                transition:opacity 1s ease-in-out;
                opacity:1;
        }

        /* Adjusted animations to travel further across the screen */
        @keyframes flyLeft { 
            from { left: 1% } 
            to { left: 75% } 
        }
        @keyframes flyRight { 
            from { right: 1% } 
            to { right: 75% } 
        }
        
        @keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }

        /* Increased Font Sizes */
        .label { 
            font-size: 2rem; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            opacity: 0.75; 
            display: block; 
            margin-bottom: 8px; 
        }
        .content { 
            font-size: 4rem; 
            text-shadow: 2px 2px 20px rgba(0,0,0,0.8); 
            line-height: 1.1;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="banner time-banner fuzzy">
        <div><span class="label">Current Time</span><div class="content" id="clock">00:00:00</div></div>
    </div>
    <div class="banner weather-banner fuzzy">
        <div><span class="label">Vancouver, WA</span><div class="content">68°F - Mostly Cloudy</div></div>
    </div>
    <div class="banner upcoming-banner fuzzy">
        <div><span class="label">Calendar Feed</span><div class="content" id="event">Loading Schedule...</div></div>
    </div>
</div>
<script>
    function updateTime() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: 'numeric', minute:'2-digit', second:'2-digit'});
    }
    
    const events = [
        "Camino Departure: Aug 21",
        "Cali for the 4th"
        "Retirement Milestone: Aug 2031"
    ];
    let i = 0;
    const eventElement=
    document.getElementaryById('event');
    
    function cycleEvents() {
        eventElement.style.opacity=0;

        setTimeout(()=>{
            i=(i+1)%events.lenth;
            eventElement.innerText=
    events[i]
            eventElement.style.opacity=1;
        },1000;
            
    }
    setInterval(updateTime, 1000);
    setInterval(cycleEvents, 10000);
    updateTime();
    eventElement.innerText=events[0];
</script>
</body>
</html>
