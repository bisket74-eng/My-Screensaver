<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background: black; margin: 0; overflow: hidden; color: white; }
        .container { display: flex; flex-direction: column; justify-content: space-around; height: 100vh; position: relative; }
        
        .banner { 
            width: 900px; 
            height: 220px; 
            display: flex; 
            align-items: center; 
            padding: 0 60px; 
            position: absolute;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            will-change: transform, opacity;
        }

        .time-banner {
            top: 10%;
            background: radial-gradient(circle at center, rgba(0,229,255,0.2) 0%, rgba(0,119,190,0) 80%);
            color: #00e5ff;
            animation: flyShatterLeft 25s linear infinite;
        }

        .weather-banner {
            top: 40%;
            background: radial-gradient(circle at center, rgba(255,183,77,0.2) 0%, rgba(255,140,0,0) 80%);
            color: #ffb74d;
            animation: flyShatterRight 28s linear infinite;
        }

        .upcoming-banner {
            top: 70%;
            background: radial-gradient(circle at center, rgba(225,190,231,0.2) 0%, rgba(155, 89, 182, 0) 80%);
            color: #e1bee7;
            animation: flyShatterLeft 30s linear infinite;
        }

        /* Movement Logic */
        @keyframes flyShatterLeft {
            0% { transform: translateX(-1000px); opacity: 1; }
            90% { transform: translateX(calc(100vw - 300px)); opacity: 1; }
            95% { transform: translateX(calc(100vw - 50px)); opacity: 0; }
            100% { transform: translateX(calc(100vw + 200px)); opacity: 0; }
        }

        @keyframes flyShatterRight {
            0% { transform: translateX(100vw); opacity: 1; }
            90% { transform: translateX(100px); opacity: 1; }
            95% { transform: translateX(-150px); opacity: 0; }
            100% { transform: translateX(-1000px); opacity: 0; }
        }

        /* Shard Styles */
        .shard {
            position: absolute;
            pointer-events: none;
            opacity: 0.8;
            filter: blur(1px);
            will-change: transform, opacity;
        }

        @keyframes floatShard {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)); opacity: 0; }
        }

        .label { font-size: 2rem; text-transform: uppercase; letter-spacing: 6px; font-weight: 800; opacity: 0.8; display: block; margin-bottom: 10px; }
        .content { font-size: 4rem; text-shadow: 2px 2px 25px rgba(0,0,0,0.9); line-height: 1.1; font-weight: 800; }
        #event { transition: opacity 1s ease-in-out; }
    </style>
</head>
<body>
<div class="container" id="mainContainer">
    <div class="banner time-banner">
        <div><span class="label">Current Time</span><div class="content" id="clock">00:00:00</div></div>
    </div>
    <div class="banner weather-banner">
        <div><span class="label">Vancouver, WA</span><div class="content" id="weather">Loading...</div></div>
    </div>
    <div class="banner upcoming-banner">
        <div><span class="label">Calendar Feed</span><div class="content" id="event">Loading...</div></div>
    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
    }

    async function getWeather() {
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=45.6387&longitude=-122.6615&current_weather=true&temperature_unit=fahrenheit');
            const data = await response.json();
            const temp = Math.round(data.current_weather.temperature);
            document.getElementById('weather').innerText = temp + "°F - Vancouver";
        } catch (error) {
            document.getElementById('weather').innerText = "Weather Unavailable";
        }
    }

    const events = ["Camino Departure: Aug 21", "Trek Planning: Late Aug", "Retirement Milestone: Aug 2031"];
    let eventIdx = 0;
    const eventElement = document.getElementById('event');

    function cycleEvents() {
        eventElement.style.opacity = 0;
        setTimeout(() => {
            eventIdx = (eventIdx + 1) % events.length;
            eventElement.innerText = events[eventIdx];
            eventElement.style.opacity = 1;
        }, 1000);
    }

    // Glass Shard Effect
    function createShards(x, y, color) {
        for (let i = 0; i < 12; i++) {
            const shard = document.createElement('div');
            shard.className = 'shard';
            
            // Random triangle shape
            const size = Math.random() * 40 + 10;
            shard.style.width = '0';
            shard.style.height = '0';
            shard.style.borderLeft = `${size/2}px solid transparent`;
            shard.style.borderRight = `${size/2}px solid transparent`;
            shard.style.borderBottom = `${size}px solid ${color}`;
            shard.style.left = x + 'px';
            shard.style.top = y + 'px';

            // Random flight path
            const tx = (Math.random() - 0.5) * 800;
            const ty = (Math.random() - 0.5) * 800;
            const tr = Math.random() * 720;
            
            shard.style.setProperty('--tx', `${tx}px`);
            shard.style.setProperty('--ty', `${ty}px`);
            shard.style.setProperty('--tr', `${tr}deg`);
            shard.style.animation = `floatShard ${Math.random() * 4 + 3}s ease-out forwards`;

            document.getElementById('mainContainer').appendChild(shard);
            setTimeout(() => shard.remove(), 7000);
        }
    }

    // Trigger shards at the edges
    function checkShatter() {
        const banners = document.querySelectorAll('.banner');
        banners.forEach(b => {
            const rect = b.getBoundingClientRect();
            // If banner is near the left or right screen edge and is fading out
            if ((rect.right > window.innerWidth - 100 || rect.left < 100) && getComputedStyle(b).opacity < 0.5) {
                const color = getComputedStyle(b).color;
                createShards(rect.left + rect.width/2, rect.top + rect.height/2, color);
            }
        });
    }

    setInterval(updateTime, 1000);
    setInterval(cycleEvents, 10000);
    setInterval(getWeather, 600000);
    setInterval(checkShatter, 2000); // Check for shatter point every 2 seconds
    
    updateTime();
    getWeather();
    eventElement.innerText = events[0]; 
</script>
</body>
</html>
